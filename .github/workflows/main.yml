name: basic CI/CD  

on: 
  push:
    branches:
      - upstream  

jobs:
  build-check-and-merge: 
    runs-on: ubuntu-latest
    environment: Actions  

    steps:
      - name: Checkout repo 
        uses: actions/checkout@v2 
        with:
          fetch-depth: 0 

      - name: Set up env
        uses: actions/setup-node@v2 
        with: 
          node-version: '22' 

      - name: install dependencies 
        run: yarn install

      - name: build project 
        run: yarn build 

      - name: merge upstream in main 
        if: success() 
        env:
          TOKEN: ${{ secrets.TOKEN }}   
        run: | 
          git config --global user.name "GitHub Actions" 
          git config --global user.email 'actions@github.com'
          git checkout master 
          git pull 
          git merge --ff-only upstream 
          git push https://x-access-token:${TOKEN}@github.com/neoSnakex34/site-astro.git master 
