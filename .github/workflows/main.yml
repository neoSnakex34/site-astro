name: basic CI/CD  

on: 
  push:
    branches:
      - upstream  

jobs:
  build-check-and-merge: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo 
        uses: actions/checkout@v2 
        with:
          fetch-depth: 0 

      - name: Set up env
        uses: actions/setup-node@v2 
        with: 
          node-version: '22' 

      - name: install dependencies 
        run: yarn install

      - name: build project 
        run: yarn build 

      - name: merge upstream in main 
        if: success() 
        run: | 
          git config --global user.name "Github Actions" 
          git config --global user.email 'actions@github.com'
          git checkout main 
          git pull 
          git merge --ff-only upstream 
          git push   





          
